<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      overflow: hidden;
      color: white;
    }

    /* ===== BOOT ===== */
    .boot {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      animation: fadeOut 3.5s ease 3.5s forwards;
    }

    .boot h1 {
      font-size: 28px;
      letter-spacing: 6px;
      animation: glow 1.2s infinite alternate;
    }

    .boot p {
      font-size: 12px;
      opacity: 0.6;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px cyan; }
      to { text-shadow: 0 0 35px magenta; }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* ===== VIEWER ===== */
    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, #111, #000);
    }

    /* ===== HUD ===== */
    .hud {
      position: absolute;
      top: 12px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.85;
      z-index: 10;
    }

    .mission {
      position: absolute;
      top: 40px;
      width: 100%;
      text-align: center;
      font-size: 11px;
      opacity: 0.6;
      z-index: 10;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.4; }
      50% { opacity: 0.9; }
      100% { opacity: 0.5; }
    }

    /* ===== GLOW CORE ===== */
    .glow {
      position: absolute;
      width: 320px;
      height: 320px;
      background: rgba(0, 200, 255, 0.18);
      filter: blur(90px);
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2.5s infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.25); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* ===== SCANLINES ===== */
    .scan {
      position: fixed;
      width: 100%;
      height: 2px;
      background: cyan;
      top: 0;
      opacity: 0.12;
      animation: scanMove 3s linear infinite;
    }

    @keyframes scanMove {
      0% { top: 0; }
      100% { top: 100%; }
    }

    /* ===== UI BUTTONS ===== */
    .controls {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    button {
      padding: 12px 16px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .start {
      background: linear-gradient(90deg, cyan, magenta);
      color: black;
      box-shadow: 0 0 20px rgba(0,200,255,0.5);
    }

    .missionBox {
      position: absolute;
      top: 90px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      opacity: 0.8;
      z-index: 10;
    }
  </style>
</head>

<body>

  <!-- BOOT -->
  <div class="boot">
    <h1>TIMELINE X</h1>
    <p>Initializing AR Game Engine...</p>
  </div>

  <div class="scan"></div>
  <div class="glow"></div>

  <div class="hud">AR GAME MODE ACTIVE</div>
  <div class="mission" id="missionText">🧠 Loading mission...</div>
  <div class="missionBox" id="missionBox">MISSION: Stabilize Core Object</div>

  <!-- MODEL -->
  <model-viewer
    id="viewer"
    src="model.glb"
    camera-controls
    auto-rotate
    ar
    ar-modes="scene-viewer quick-look webxr"
    shadow-intensity="1"
    exposure="1.1"
  ></model-viewer>

  <!-- BUTTON -->
  <div class="controls">
    <button class="start" onclick="startARGame()">ENTER MISSION</button>
  </div>

  <script>
    const viewer = document.getElementById("viewer");
    const missionText = document.getElementById("missionText");
    const missionBox = document.getElementById("missionBox");

    // fake AI mission system
    const missions = [
      "Scanning environment...",
      "Energy anomaly detected...",
      "Core object unstable...",
      "Stabilization required...",
      "Ready for AR deployment"
    ];

    let i = 0;
    setInterval(() => {
      missionText.innerText = "🧠 Nexus AI: " + missions[i % missions.length];
      i++;
    }, 1800);

    function playGameSound() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();

      o.type = "sawtooth";
      o.frequency.setValueAtTime(120, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 1.5);

      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.5);

      o.connect(g);
      g.connect(ctx.destination);

      o.start();
      o.stop(ctx.currentTime + 1.5);
    }

    function startARGame() {
      if (navigator.vibrate) navigator.vibrate([80, 40, 120]);

      playGameSound();

      missionBox.innerText = "MISSION: Deploy Core into Reality";

      setTimeout(() => {
        viewer.activateAR();
      }, 900);
    }
  </script>

</body>
</html>
