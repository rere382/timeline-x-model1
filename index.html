<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    /* ===== AI INTRO LAYER ===== */
    .ai {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: fadeOut 3.5s ease 4s forwards;
    }

    .ai-title {
      font-size: 28px;
      letter-spacing: 6px;
      font-weight: bold;
      animation: glow 1.2s infinite alternate;
    }

    .ai-sub {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.6;
      animation: flicker 1.2s infinite;
    }

    .ai-log {
      margin-top: 20px;
      font-size: 11px;
      opacity: 0.4;
      font-family: monospace;
      animation: typing 3s steps(40);
      white-space: nowrap;
      overflow: hidden;
      width: 0;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px cyan; }
      to { text-shadow: 0 0 30px magenta; }
    }

    @keyframes flicker {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 260px; }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* ===== MAIN UI ===== */
    .top {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 2s ease 4.2s forwards;
    }

    .title {
      font-size: 18px;
      letter-spacing: 3px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 4px;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, #111, #000);
    }

    /* ===== PORTAL EFFECT ===== */
    .portal {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,255,0.2), transparent);
      filter: blur(40px);
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* ===== AR BUTTON STATES ===== */
    .enter {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      background: linear-gradient(90deg, cyan, magenta);
      border: none;
      border-radius: 50px;
      font-weight: bold;
      color: black;
      font-size: 15px;
      z-index: 10;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(0,255,255,0.4);
      opacity: 0;
      animation: fadeIn 2s ease 4.5s forwards;
    }

    .enter:active {
      transform: translateX(-50%) scale(0.95);
    }

    /* ===== SCANLINE ===== */
    .scanline {
      position: fixed;
      width: 100%;
      height: 2px;
      background: cyan;
      top: 0;
      opacity: 0.15;
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
  </style>
</head>

<body>

  <!-- AI BOOT -->
  <div class="ai">
    <div class="ai-title">TIMELINE X</div>
    <div class="ai-sub">Nexus AI • Reality Engine Booting</div>
    <div class="ai-log">[system] calibrating spatial AR mesh...</div>
  </div>

  <!-- SCAN EFFECT -->
  <div class="scanline"></div>

  <!-- MAIN UI -->
  <div class="top">
    <div class="title">TIMELINE X</div>
    <div class="subtitle">Powered by Nexus AI • Reality Layer Active</div>
  </div>

  <div class="portal"></div>

  <!-- MODEL -->
  <model-viewer
    id="viewer"
    src="model.glb"
    camera-controls
    auto-rotate
    ar
    ar-modes="scene-viewer quick-look webxr"
    shadow-intensity="1"
    exposure="1"
    style="width:100vw;height:100vh;"
  ></model-viewer>

  <!-- ENTER AR -->
  <button class="enter" onclick="launchAR()">
    ENTER REALITY PORTAL ✨
  </button>

  <script>
    function launchAR() {
      const viewer = document.getElementById("viewer");

      // haptic feedback if supported
      if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

      // small delay for "portal feel"
      setTimeout(() => {
        viewer.activateAR();
      }, 600);
    }
  </script>

</body>
</html>
