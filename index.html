<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    /* ===== BOOT ===== */
    .boot {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: fadeOut 3s ease 3.5s forwards;
    }

    .boot h1 {
      font-size: 28px;
      letter-spacing: 5px;
      animation: glow 1.2s infinite alternate;
    }

    .boot p {
      font-size: 12px;
      opacity: 0.6;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px cyan; }
      to { text-shadow: 0 0 30px magenta; }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* ===== MAIN UI ===== */
    .hud {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 2s ease 3.8s forwards;
    }

    .hud-title {
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .hud-sub {
      font-size: 11px;
      opacity: 0.6;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ===== MODEL ===== */
    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, #111, #000);
    }

    /* ===== PORTAL EFFECT ===== */
    .portal {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,180,255,0.25), transparent);
      filter: blur(60px);
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2s infinite;
      z-index: 1;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* ===== BUTTON ===== */
    .enter {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
      background: linear-gradient(90deg, cyan, magenta);
      color: black;
      box-shadow: 0 0 25px rgba(0,200,255,0.5);
      opacity: 0;
      animation: fadeIn 2s ease 4s forwards;
    }

    /* ===== REALITY SHIFT OVERLAY ===== */
    .fx {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
    }

    .fx.active {
      opacity: 1;
      background: radial-gradient(circle, rgba(0,140,255,0.4), black);
      backdrop-filter: blur(10px);
    }

    .fx-text {
      font-size: 14px;
      letter-spacing: 3px;
      color: cyan;
      animation: glitch 0.6s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0,0); text-shadow: 2px 0 magenta; }
      25% { transform: translate(2px,-1px); }
      50% { transform: translate(-2px,1px); text-shadow: -2px 0 cyan; }
      75% { transform: translate(1px,2px); }
      100% { transform: translate(0,0); }
    }

    /* scanline */
    .scanline {
      position: fixed;
      width: 100%;
      height: 2px;
      background: cyan;
      top: 0;
      opacity: 0.1;
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
  </style>
</head>

<body>

  <!-- BOOT -->
  <div class="boot">
    <h1>TIMELINE X</h1>
    <p>Nexus AI • Reality Engine Syncing</p>
  </div>

  <!-- SCANLINE -->
  <div class="scanline"></div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-title">TIMELINE X</div>
    <div class="hud-sub">Portal AR System Active</div>
  </div>

  <!-- PORTAL -->
  <div class="portal"></div>

  <!-- REALITY SHIFT FX -->
  <div id="fx" class="fx">
    <div class="fx-text">REALITY SHIFT INITIATED...</div>
  </div>

  <!-- MODEL -->
  <model-viewer
    id="viewer"
    src="model.glb"
    camera-controls
    auto-rotate
    ar
    ar-modes="scene-viewer quick-look webxr"
    shadow-intensity="1"
    exposure="1"
    style="width:100vw;height:100vh;"
  ></model-viewer>

  <!-- BUTTON -->
  <button class="enter" onclick="enterAR()">
    ENTER PORTAL ✨
  </button>

  <script>
    const viewer = document.getElementById("viewer");
    const fx = document.getElementById("fx");

    function enterAR() {
      if (navigator.vibrate) navigator.vibrate([60, 30, 90]);

      // show reality shift
      fx.classList.add("active");

      // delay AR launch for effect
      setTimeout(() => {
        viewer.activateAR();
      }, 900);

      // remove effect after launch
      setTimeout(() => {
        fx.classList.remove("active");
      }, 2500);
    }
  </script>

</body>
</html>
