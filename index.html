<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      overflow: hidden;
      color: white;
    }

    /* ===== CINEMATIC INTRO ===== */
    .cinema {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      animation: fadeOut 3.5s ease 3.5s forwards;
    }

    .cinema h1 {
      font-size: 28px;
      letter-spacing: 6px;
      animation: glow 1.2s infinite alternate;
    }

    .cinema p {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 8px;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px cyan; }
      to { text-shadow: 0 0 35px magenta; }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* ===== CINEMATIC SCANLINES ===== */
    .scan {
      position: fixed;
      width: 100%;
      height: 2px;
      background: cyan;
      top: 0;
      opacity: 0.15;
      animation: scanMove 3s linear infinite;
      z-index: 5;
    }

    @keyframes scanMove {
      0% { top: 0; }
      100% { top: 100%; }
    }

    /* ===== VIEWER ===== */
    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, #0a0a0a, #000);
    }

    /* ===== HUD ===== */
    .hud {
      position: absolute;
      top: 12px;
      width: 100%;
      text-align: center;
      z-index: 10;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.85;
    }

    .hint {
      position: absolute;
      top: 38px;
      width: 100%;
      text-align: center;
      font-size: 11px;
      opacity: 0.5;
      z-index: 10;
    }

    /* ===== GLASS GLOW ===== */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(0, 180, 255, 0.18);
      filter: blur(80px);
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* ===== CONTROLS ===== */
    .controls {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    button {
      padding: 12px 16px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .select {
      background: white;
      color: black;
    }

    .ar {
      background: linear-gradient(90deg, cyan, magenta);
      color: black;
    }

    /* ===== REALITY SHIFT FX ===== */
    .fx {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99998;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
    }

    .fx.active {
      opacity: 1;
      background: radial-gradient(circle, rgba(0,150,255,0.35), black);
      backdrop-filter: blur(10px);
    }

    .fx-text {
      font-size: 13px;
      letter-spacing: 3px;
      color: cyan;
      animation: glitch 0.6s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0,0); text-shadow: 2px 0 magenta; }
      25% { transform: translate(2px,-1px); }
      50% { transform: translate(-2px,1px); text-shadow: -2px 0 cyan; }
      75% { transform: translate(1px,2px); }
      100% { transform: translate(0,0); }
    }
  </style>
</head>

<body>

  <!-- CINEMATIC INTRO -->
  <div class="cinema">
    <h1>TIMELINE X</h1>
    <p>Nexus AI • Initializing Reality Engine</p>
  </div>

  <!-- SCANLINES -->
  <div class="scan"></div>

  <!-- HUD -->
  <div class="hud">CINEMATIC AR WORLD • ACTIVE</div>
  <div class="hint">Select Core or Room → Enter AR</div>

  <div class="glow"></div>

  <!-- REALITY SHIFT FX -->
  <div id="fx" class="fx">
    <div class="fx-text">REALITY STABILIZING...</div>
  </div>

  <!-- MODEL -->
  <model-viewer
    id="viewer"
    src="model.glb"
    camera-controls
    auto-rotate
    ar
    ar-modes="scene-viewer quick-look webxr"
    shadow-intensity="1"
    exposure="1"
  ></model-viewer>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="select" onclick="setCore()">Core</button>
    <button class="select" onclick="setRoom()">Room</button>
    <button class="ar" onclick="enterAR()">ENTER AR</button>
  </div>

  <script>
    const viewer = document.getElementById("viewer");
    const fx = document.getElementById("fx");

    let selectedModel = "model.glb";

    function setCore() {
      selectedModel = "model.glb";
      viewer.src = selectedModel;
    }

    function setRoom() {
      selectedModel = "futuristic_compact_room-v1.glb";
      viewer.src = selectedModel;
    }

    function enterAR() {
      viewer.src = selectedModel;

      if (navigator.vibrate) navigator.vibrate([60, 30, 90]);

      fx.classList.add("active");

      setTimeout(() => {
        viewer.activateAR();
      }, 900);

      setTimeout(() => {
        fx.classList.remove("active");
      }, 2500);
    }
  </script>

</body>
</html>
