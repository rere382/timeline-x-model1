<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      overflow: hidden;
      color: white;
    }

    /* ===== SCAN UI ===== */
    .scan {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black;
      z-index: 9999;
      animation: fadeOut 3s ease 3.5s forwards;
    }

    .scan h1 {
      letter-spacing: 5px;
      font-size: 26px;
      animation: glow 1.2s infinite alternate;
    }

    .scan p {
      font-size: 12px;
      opacity: 0.6;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px cyan; }
      to { text-shadow: 0 0 30px magenta; }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* ===== MAIN ===== */
    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, #111, #000);
    }

    /* HUD */
    .hud {
      position: absolute;
      top: 12px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      letter-spacing: 2px;
      opacity: 0.8;
      z-index: 10;
    }

    /* MODE SELECT */
    .panel {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    button {
      padding: 12px 16px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .ar {
      background: linear-gradient(90deg, cyan, magenta);
      color: black;
    }

    .swap {
      background: white;
      color: black;
    }

    /* glow */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(0, 200, 255, 0.15);
      filter: blur(80px);
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

  <!-- SCAN INTRO -->
  <div class="scan">
    <h1>TIMELINE X</h1>
    <p>Scanning environment for AR placement...</p>
  </div>

  <div class="hud">REAL WORLD AR MODE • NEXUS ENGINE</div>

  <div class="glow"></div>

  <!-- MODEL -->
  <model-viewer
    id="viewer"
    src="model.glb"
    camera-controls
    auto-rotate
    ar
    ar-modes="scene-viewer quick-look webxr"
    shadow-intensity="1"
    exposure="1"
  ></model-viewer>

  <!-- CONTROLS -->
  <div class="panel">
    <button class="swap" onclick="setMain()">Core Object</button>
    <button class="swap" onclick="setDesk()">Desk Object</button>
    <button class="ar" onclick="startAR()">PLACE IN REAL WORLD</button>
  </div>

  <script>
    const viewer = document.getElementById("viewer");

    function setMain() {
      viewer.src = "model.glb";
    }

    function setDesk() {
      viewer.src = "desk.glb";
    }

    function startAR() {
      if (navigator.vibrate) navigator.vibrate([70, 40, 90]);

      // slight delay = “scan feel”
      setTimeout(() => {
        viewer.activateAR();
      }, 600);
    }
  </script>

</body>
</html>
